<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Rang Tanlagich bilan</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            overflow: hidden;
            font-family: sans-serif;
        }
        canvas {
            display: block;
        }
        /* Rang tanlash paneli */
        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            z-index: 100;
        }
        input[type="color"] {
            cursor: pointer;
            border: none;
            width: 40px;
            height: 40px;
            background: none;
        }
    </style>
</head>
<body>

    <div class="controls">
        <label for="colorPicker">Rangni tanlang: </label>
        <input type="color" id="colorPicker" value="#ff00ff"> </div>

    <canvas id="matrixCanvas"></canvas>

    <script>
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const alphabet = "アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const fontSize = 16;
        const columns = canvas.width / fontSize;

        const rainDrops = [];
        for (let x = 0; x < columns; x++) {
            rainDrops[x] = 1;
        }

        // Tanlangan rangni saqlash uchun o'zgaruvchi
        let currentColor = colorPicker.value;

        // Rang o'zgarganda uni ushlab olish
        colorPicker.addEventListener('input', (e) => {
            currentColor = e.target.value;
        });

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Tanlangan rangni ishlatish
            ctx.fillStyle = currentColor;
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        setInterval(draw, 30);
    </script>
</body>
</html>
